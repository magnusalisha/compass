<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1B2A22">
<title>Compass</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1B2A22; --card:#F1EBE0; --card2:#E7E0D2; --ink:#20261F; --ink2:#5C6558;
    --gold:#C4913B; --line:#D6CDBC; --pale:#C9D6C4; --dim:#7E9182; --warn:#8C3B22;
    --car:#B5462F; --lim:#D4802A; --myr:#6B8C3A; --apn:#3E7A5E; --bpn:#3E7A5E;
    --lin:#8B7BC7; --hum:#8B6A3E; --bis:#D4B483; --tpl:#2F8F7A; --oci:#94A83C;
    --ter:#5E9B8F; --far:#B08A4E; --etc:#9AA694;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--pale);font-family:Inter,system-ui,sans-serif;
       line-height:1.5;padding:22px 18px calc(48px + env(safe-area-inset-bottom));max-width:680px;margin:0 auto}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;
           text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px}
  h1{font-family:Fraunces,serif;font-size:52px;font-weight:700;color:#F3EFE4;
     letter-spacing:-.02em;line-height:1;margin:12px 0 10px}
  .sub{color:var(--dim);font-size:15px;max-width:34ch;margin-bottom:22px}

  .tabs{display:flex;gap:9px;margin-bottom:16px}
  .tabs button{flex:1;padding:12px 8px;border-radius:999px;border:1px solid var(--dim);
    background:transparent;color:var(--pale);font:600 14px Inter,sans-serif;cursor:pointer}
  .tabs button[aria-selected="true"]{background:var(--gold);border-color:var(--gold);color:#231A08}

  .stockrow{display:flex;align-items:center;gap:10px;margin-bottom:16px;color:var(--pale);font-size:14px}
  .stockrow input{width:20px;height:20px;accent-color:var(--gold)}

  input[type=text],select{width:100%;padding:15px 16px;border-radius:12px;border:none;
    background:var(--card);color:var(--ink);font:500 16px Inter,sans-serif;margin-bottom:11px}
  select{font-family:'IBM Plex Mono',monospace;font-size:15px;
    appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--ink2) 50%),linear-gradient(135deg,var(--ink2) 50%,transparent 50%);

    background-size:5px 5px,5px 5px;background-repeat:no-repeat}
  input:focus,select:focus{outline:2px solid var(--gold);outline-offset:2px}
  .pair{display:flex;gap:9px}
  .pair select,.pair .combo{flex:1;min-width:0}

  /* clear (×) button living inside the search field */
  .searchwrap{position:relative;margin-bottom:11px}
  .searchwrap input{margin-bottom:0;padding-right:46px}
  .clearbtn{position:absolute;right:7px;top:50%;transform:translateY(-50%);
    width:32px;height:32px;border:none;background:none;color:var(--ink2);
    font:400 21px/1 Inter,sans-serif;border-radius:50%;cursor:pointer;
    display:none;align-items:center;justify-content:center;padding:0}
  .clearbtn.show{display:flex}
  .clearbtn:hover{background:var(--card2);color:var(--ink)}

  .catseg{display:flex;gap:6px;margin-bottom:11px}

  .combo-list{position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--card);

    display:flex;gap:8px;align-items:baseline}
  .combo-list li span{color:var(--ink2);font-size:13px}
  .combo-list li:hover,.combo-list li.hl{background:var(--card2)}
  .combo-list li.combo-empty{color:var(--ink2);cursor:default;font-size:13.5px}
  .combo-list li.combo-empty:hover{background:none}

  .card{background:var(--card);color:var(--ink);border-radius:16px;padding:18px;margin-bottom:12px}
  .card.card-faint{border:1px dashed var(--warn)}
  .card h2{font-family:Fraunces,serif;font-size:19px;font-weight:700;letter-spacing:-.01em;line-height:1.25}
  .thc{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:19px;text-align:right;white-space:nowrap}
  .thc small{display:block;font-size:10px;color:var(--ink2);font-weight:400;letter-spacing:.08em}
  .top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;
    text-transform:uppercase;background:#DCE6D8;color:#3D5140;padding:4px 9px;border-radius:5px}
  .tag-shelf{background:#E0DAEF;color:#4B3E70}
  .tag-unset{background:transparent;border:1px dashed var(--line);color:var(--ink2)}

  /* label vs chemistry — the comparison the archive exists to make */
  .verdict{font-size:13.5px;margin-top:10px;padding:9px 11px;border-radius:8px;
    background:#E8E7DD;color:var(--ink2);line-height:1.4}
  .verdict.clash{background:#F6E3D3;border:1px solid #E0B99A;color:#7A3A1C}

  .stack{display:flex;height:11px;border-radius:6px;overflow:hidden;margin:13px 0 11px;background:#E0D8C8}
  .stack i{height:100%}
  .chips{display:flex;flex-wrap:wrap;gap:6px 16px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--ink2)}
  .chips span{display:flex;align-items:center;gap:6px}
  .chips b{width:8px;height:8px;border-radius:50%;flex:none}

  /* mirrored comparison — read the difference, don't decode it */
  .cmp{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px 10px;margin-top:14px}
  .cmp .val{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink2)}
  .cmp .val.r{text-align:right}
  .cmp .nm{font-size:13.5px;text-align:center;white-space:nowrap;font-weight:500}
  .cmp .tr{height:11px;border-radius:4px;background:#E0D8C8;position:relative}
  .cmp .tr i{position:absolute;top:0;bottom:0;border-radius:4px}
  .cmp .tr.l i{right:0} .cmp .tr.r i{left:0}

  .read{margin-top:18px;padding-top:15px;border-top:1px dashed var(--line)}
  .read p{margin-bottom:10px;font-size:15px}
  .read p:last-child{margin-bottom:0}
  .read-faint{opacity:.88}
  .faint-flag{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--warn);margin-bottom:9px}
  .faint-explain{font-size:12.5px;color:var(--ink2);font-style:italic;margin-top:8px}
  .warnbox{background:#F6E3D3;border:1px solid #E0B99A;color:#7A3A1C;border-radius:10px;
    padding:12px 13px;margin-top:13px;font-size:13.5px;line-height:1.45}
  .ev{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink2);margin-top:7px;letter-spacing:.04em}
  .why{margin-top:9px;font-size:12.5px;color:var(--ink2)}
  .why summary{cursor:pointer;color:var(--ink2);font-family:'IBM Plex Mono',monospace;font-size:11px;

  .why summary::before{content:'▸ '}
  .why[open] summary::before{content:'▾ '}
  .why ul{margin-top:9px;padding-left:16px}
  .why li{margin-bottom:9px;line-height:1.45}
  .why li:last-child{margin-bottom:0}
  .why .ev{display:inline;margin:0 0 0 4px}
  .match{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#3D6B4F;margin-top:12px;font-weight:500}
  .acts{display:flex;gap:18px;margin-top:13px;padding-top:12px;border-top:1px dashed var(--line)}
  .acts button,.acts a{background:none;border:none;padding:0;color:var(--ink2);font:500 13.5px Inter,sans-serif;cursor:pointer;text-decoration:none}
  .acts button:hover,.acts a:hover{color:var(--ink);text-decoration:underline}
  .empty{color:var(--dim);text-align:center;padding:34px 14px;font-size:15px}
  .lookup-list{display:flex;flex-direction:column;gap:8px}
  .lookup-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;

  .lookup-strain{font-family:Fraunces,serif;font-weight:700;font-size:15.5px}
  .lookup-brand{color:var(--ink2);font-size:13px;white-space:nowrap;flex:none}
  .lookup-back{background:none;border:none;color:var(--pale);font:600 13.5px Inter,sans-serif;

  .lookup-back:hover{color:#fff}
  .foot{margin-top:26px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.6}
  .flash{background:#33473A;border:1px solid #48604F;color:var(--pale);border-radius:10px;
    padding:11px 13px;margin-bottom:14px;font-size:13px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<label class="stockrow"><input type="checkbox" id="oos"> Include out-of-stock items</label>

<div id="out"></div>

// 3 = a real receptor mechanism. 2 = animal work + some human data. 1 = folklore,
// rodent studies at doses you'll never inhale, or aromatherapy. Most of this is a 1.
const REPORTED = {

  'Limonene':['lifts mood, brightens',2,'Some small human inhalation studies on mood/anxiety. No cannabinoid-receptor mechanism.'],
  'Linalool':['mellow, softens the edges',2,'Sedative in rodent models and aromatherapy work. Not shown at inhaled cannabis doses.'],
  'beta-Myrcene':['heavy, sedating, couch-leaning',1,'The couch-lock claim traces to rodent studies at doses far above anything you inhale. Popular, poorly evidenced.'],

const dots = n => '●'.repeat(n) + '○'.repeat(3-n);

// ── category: derived from `form`, first rule wins. Add a rule to grow further.
// Vape is checked before Preroll: a disposable never says "preroll", but an

// Word boundaries matter — bare /cart/ would match "carton" and /pod/ "tripod".
// The preroll pattern accepts Preroll, Pre-roll, Pre-Roll and Pre Roll: real
// COAs use all four, and /preroll/i alone was silently filing the hyphenated
// ones under Flower.
const CATEGORY_RULES = [
  [/\b(vapes?|carts?|cartridges?|disposables?|pods?)\b/i, 'Vape'],
  [/pre[\s-]?rolls?/i, 'Preroll'],
];

// guessed tag would make the label-vs-chemistry comparison measure the guess
// (CLAUDE_CODE_BRIEF.md). Anything unrecognised — a typo, a stray space, a
// missing field — normalises to Unverified, which is excluded from the
// comparison. Failing closed is the point: a mistyped tag must never be
// mistaken for a real one a human stood in front of the package and set.
// The page does NOT own this vocabulary — compass-manage.js does, and the page
// never writes the field. So display whatever string the record holds instead
// of validating against a list here: a value added at the editing end (like
// "Sativa-leaning Hybrid", which some NY brands print) renders with no change
// to this file. Only blank/missing/"Unverified" count as unset.
const shelfTag = p => {
  const v = String(p.shelf_tag || '').trim();
  return (!v || v.toLowerCase() === 'unverified') ? 'Unverified' : v;
};
// The direction each label CLAIMS — used only to decide whether the package
// and the chemistry contradict each other. A plain "Hybrid" asserts no
// direction, and an unrecognised value has no known one, so neither can clash;
// both still display, they just don't get a verdict. Keys are lowercased for
// matching, so capitalisation drift in a hand-edited record still resolves.
const SHELF_EXPECTS = {
  'sativa': 'lifting',
  'sativa-leaning hybrid': 'lifting',
  'indica-leaning hybrid': 'settling',
  'indica': 'settling'
};

// Returns null when we can't ask the question honestly: Unverified is excluded
// by the brief, and a faint profile is explicitly LESS trustworthy than the
// package label ("trust the package label, not this profile") — so it doesn't
// get to contradict it.
function labelCheck(p){
  const tag = shelfTag(p);
  if (tag === 'Unverified' || p.confidence === 'faint' || !p.lean) return null;
  const expects = SHELF_EXPECTS[tag.toLowerCase()];
  // 'mixed' is the absence of a direction, not the opposite one — it contradicts nothing.
  return {tag, lean: p.lean, clash: !!expects && p.lean !== 'mixed' && p.lean !== expects};
}
function verdictHTML(p){
  const v = labelCheck(p);

// Stock lives in the repo — ONE copy, the same on every device and every shift.
// It used to be a localStorage overlay per device, which meant your phone, the
// other budtender's phone and each register could all disagree, and a device
// that had ever toggled a record ignored the repo for it permanently. Writes go
// through the Worker (see compass-stock-worker.js) because this page is public
// and must never hold a GitHub token.
const stocked = p => p.in_stock !== false;

// When something was marked sold out. Shown because stock accuracy depends on
// people remembering to mark things — same discipline the jar labels need. A
// visible date makes drift obvious instead of invisible.
function soldOutWhen(p){
  if (!p.sold_out_at) return '';
  const days = Math.floor((Date.now() - new Date(p.sold_out_at)) / 86400000);
  if (isNaN(days)) return '';
  return days <= 0 ? ' today' : days === 1 ? ' yesterday' : ` ${days} days ago`;
}

let busyKey = null;   // record currently being written, so we can disable its button

// Belt and braces against stale reads. There are three caches between a write
// and the next read (Cloudflare edge, raw.githubusercontent, the GitHub API
// listing). If any of them serves an old copy, a refresh would silently flip a
// just-marked record back — which is exactly the bug that showed up in use.
// So for two minutes after a confirmed write we re-assert what we know is true,
// regardless of what a refresh brings back.
const recentWrites = new Map();   // key -> {in_stock, until}
function applyRecentWrites(records){
  const now = Date.now();
  for (const [k, w] of recentWrites) if (w.until < now) recentWrites.delete(k);
  if (!recentWrites.size) return records;
  return records.map(r => {
    const w = recentWrites.get(key(r));
    return w ? Object.assign({}, r, {in_stock: w.in_stock}) : r;
  });
}
async function setStock(k, soldOut){
  if (!STOCK_API || busyKey) return;
  const p = DATA.find(x => key(x) === k);
  if (!p) return;
  const before = p.in_stock;
  busyKey = k;
  p.in_stock = !soldOut;      // optimistic — the counter shouldn't wait on a round trip
  render();
  try {
    const res = await fetch(STOCK_API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({key: k, sold_out: soldOut})
    });
    const out = await res.json().catch(() => ({}));
    if (!res.ok || !out.ok) throw new Error(out.error || `HTTP ${res.status}`);
    recentWrites.set(k, {in_stock: !soldOut, until: Date.now() + 120000});
    flash = `${p.strain} — ${soldOut ? 'marked sold out' : 'back in stock'}. Everyone sees this.`;
  } catch (err) {
    p.in_stock = before;      // put it back; never leave a lie on screen
    flash = `Couldn't save that — ${err.message}. Nothing changed, try again.`;
  }
  busyKey = null;
  render();
  setTimeout(() => { flash = ''; render(); }, 4000);
}
// Alphabetical by strain — this is the resting order every tab inherits (effect
// with nothing typed, Lookup's matches, the combobox dropdowns). The ranked views
// re-sort by score/similarity on top of this, so relevance still wins where it
// exists; alphabetical just breaks their ties. filter() copies, so DATA is never mutated.
const pool = () => DATA.filter(p => $('#oos').checked || stocked(p))
  .sort((x, y) => x.strain.localeCompare(y.strain, undefined, {sensitivity: 'base'}));

function vec(p){ const t = p.total_terpenes || 1, o = {};
  for (const [k,v] of Object.entries(p.terpenes)) o[k] = v/t; return o; }
function sim(x, y){
  const vx = vec(x), vy = vec(y); let d=0, nx=0, ny=0;
  for (const k of new Set([...Object.keys(vx), ...Object.keys(vy)])){
    const p = vx[k]||0, q = vy[k]||0; d += p*q; nx += p*p; ny += q*q;
  }
  return (nx&&ny) ? d/(Math.sqrt(nx)*Math.sqrt(ny)) : 0;
}
function says(p){
  const w = p.dominant.map(k => REPORTED[k] && REPORTED[k][0]).filter(Boolean).slice(0,2);
  return w.length ? w.join(', ') : 'hard to call from the terpenes alone';
}
// the honest bit: how good is the evidence behind THIS product's read?
function ev(p){
  const es = p.dominant.map(k => REPORTED[k] && REPORTED[k][1]).filter(Boolean);
  return es.length ? Math.max(...es) : 1;
}
// the explanation: which dominant terpenes drive the read, and what that rests on
function whyHTML(p){
  const rows = p.dominant.map(k => REPORTED[k] ? [k, ...REPORTED[k]] : null).filter(Boolean);
  if (!rows.length) return '';
  return `<details class="why"><summary>Why?</summary><ul>${rows.map(([k, phrase, strength, mech]) =>
    `<li><b>${short(k)}</b> → ${phrase} <span class="ev">${dots(strength)}</span><br>${mech}</li>`).join('')}</ul></details>`;
}
// the "evaporated" story is a flower/preroll thing — an edible reads faint
// because it's naturally low in terpenes, not because it's stale. Extraction
// always writes a note (see SHORTCUT.md), so this is only a fallback for
// hand-edited or older records.
function faintNote(p){
  if (p.note) return p.note;
  return isEdible(p)
    ? "Terpene content this low is normal for this form — it's not a sign of age, there's just not enough here to read a character off of. Read the label, not this profile."
    : "Low total terpenes and mostly heavy sesquiterpenes — the volatile ones have likely evaporated. Read the label, not this profile.";
}

function stack(p){
  const e = Object.entries(p.terpenes).filter(([,v]) => v>0);
  const s = e.reduce((t,[,v]) => t+v, 0) || 1;
  return `<div class="stack">${e.map(([k,v]) => `<i style="width:${v/s*100}%;background:${col(k)}"></i>`).join('')}</div>
    <div class="chips">${e.slice(0,3).map(([k,v]) => `<span><b style="background:${col(k)}"></b>${short(k).toLowerCase()} ${v}%</span>`).join('')}</div>`;
}
function card(p, extra=''){
  const faint = p.confidence === 'faint';
  const tag = shelfTag(p);
  const href = editURL(p);
  return `<div class="card${faint ? ' card-faint' : ''}">
    <div class="top">
      <div><h2>${p.strain}</h2>
        <div class="tags">
          <span class="tag">${p.form.split(' ')[0]}</span>
          <span class="tag tag-${tag === 'Unverified' ? 'unset' : 'shelf'}">${tag}</span>
        </div>
        <div style="font-size:13px;color:var(--ink2);margin-top:6px">${p.brand}${stocked(p)?'':` · sold out${soldOutWhen(p)}`}</div></div>
      <div class="thc">${p.thc}%<small>THC</small></div>
    </div>
    ${stack(p)}
    <div class="read${faint ? ' read-faint' : ''}" style="border-top:none;padding-top:12px;margin-top:12px">
      ${faint ? `<p class="faint-flag">⚠ Low-confidence guess — terpenes are faint here, trust your nose</p>` : ''}
      <p style="font-size:14px;color:var(--ink2)">Can read as <b>${says(p)}</b>.</p>
      <p class="ev">${dots(ev(p))} evidence · ${ev(p)===3?'real mechanism':ev(p)===2?'some human data':'folklore — trust your nose over this'}</p>
      ${whyHTML(p)}
      ${verdictHTML(p)}
      ${faint ? `<p class="faint-explain">${faintNote(p)}</p>` : ''}
    </div>
    ${extra}
    <div class="acts">
      ${STOCK_API ? `<button onclick="setStock('${key(p)}', ${stocked(p)})" ${busyKey === key(p) ? 'disabled' : ''}>${
        busyKey === key(p) ? 'Saving…' : stocked(p) ? 'Mark sold out' : 'Back in stock'}</button>` : ''}
      ${href ? `<a href="${href}" target="_blank" rel="noopener">Edit ↗</a>` : ''}
    </div>
  </div>`;
}

// ── the read: honest about what it can and can't call
function read(x, y){
  const faint = [x,y].filter(p => p.confidence === 'faint');
  let h = '';
  if (faint.length){
    h += `<p><b>Can't call this from the terpenes.</b> ${faint.map(p=>p.strain).join(' and ')} ${faint.length>1?'have':'has'} very little terpene content left (${faint.map(p=>p.total_terpenes+'%').join(', ')}), and what survives is the heavy stuff that always survives. That tells you about age and handling, not about the strain. <b>Go with the package label here.</b></p>`;
    if (Math.abs(x.thc - y.thc) >= 3){
      const [hi, lo] = x.thc >= y.thc ? [x,y] : [y,x];
      h += `<p>What I can say: <b>${hi.strain}</b> is the stronger one (${hi.thc}% THC vs ${lo.thc}%).</p>`;
    }
    return h;
  }
  if (x.lean !== y.lean && x.lean !== 'mixed' && y.lean !== 'mixed')
    h += `<p>These pull in opposite directions. People tend to describe <b>${x.strain}</b> as <b>${says(x)}</b>; <b>${y.strain}</b> more <b>${says(y)}</b>.</p>`;
  else if (x.dominant[0] === y.dominant[0])
    h += `<p>Both lead with <b>${short(x.dominant[0]).toLowerCase()}</b>, so they're close cousins — both usually described as <b>${says(x)}</b>. The difference is underneath.</p>`;
  else
    h += `<p><b>${x.strain}</b> reads <b>${says(x)}</b>. <b>${y.strain}</b> reads <b>${says(y)}</b>.</p>`;

  const gaps = [...new Set([...x.dominant, ...y.dominant])]
    .map(k => [k, (x.terpenes[k]||0) - (y.terpenes[k]||0)])
    .filter(([,d]) => Math.abs(d) >= 0.1)
    .sort((p,q) => Math.abs(q[1]) - Math.abs(p[1])).slice(0,2);
  for (const [k, d] of gaps){
    const [hi, lo] = d > 0 ? [x,y] : [y,x];
    h += `<p><b>${hi.strain}</b> carries more ${short(k).toLowerCase()} (${hi.terpenes[k]||0}% vs ${lo.terpenes[k]||0}%) — ${REPORTED[k]?REPORTED[k][0]:'a character difference'} <span class="ev">${REPORTED[k]?dots(REPORTED[k][1]):''}</span></p>`;
  }
  if (!gaps.length) h += `<p>The profiles are close enough that I'd sell on smell or price.</p>`;
  if (Math.abs(x.thc - y.thc) >= 3){
    const [hi, lo] = x.thc >= y.thc ? [x,y] : [y,x];
    h += `<p><b>${hi.strain}</b> is meaningfully stronger (${hi.thc}% THC vs ${lo.thc}%) — that'll drive the experience more than any terpene here.</p>`;
  }
  return h;
}

function compare(x, y){
  const keys = [...new Set([...Object.keys(x.terpenes), ...Object.keys(y.terpenes)])]
    .filter(k => (x.terpenes[k]||0) > 0 || (y.terpenes[k]||0) > 0)
    .sort((p,q) => ((y.terpenes[q]||0)+(x.terpenes[q]||0)) - ((y.terpenes[p]||0)+(x.terpenes[p]||0)));
  const max = Math.max(...keys.map(k => Math.max(x.terpenes[k]||0, y.terpenes[k]||0)), 0.01);
  return `<div class="card">
    <div class="top">
      <div><h2>${x.strain}</h2><div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink2);margin-top:4px">THC ${x.thc}% · terps ${x.total_terpenes}%</div></div>
      <div style="text-align:right"><h2>${y.strain}</h2><div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink2);margin-top:4px">THC ${y.thc}% · terps ${y.total_terpenes}%</div></div>
    </div>
    <div class="cmp">
      ${keys.map(k => {
        const p = x.terpenes[k]||0, q = y.terpenes[k]||0;
        return `<div class="val r">${p||'—'}</div>
          <div style="display:grid;grid-template-columns:1fr 108px 1fr;align-items:center;gap:9px;grid-column:2;width:100%">
            <div class="tr l"><i style="width:${p/max*100}%;background:${col(k)};opacity:${p>=q?1:.42}"></i></div>
            <div class="nm">${short(k)}</div>
            <div class="tr r"><i style="width:${q/max*100}%;background:${col(k)};opacity:${q>=p?1:.42}"></i></div>
          </div>
          <div class="val">${q||'—'}</div>`;
      }).join('')}
    </div>
    <div class="read"><div class="eyebrow" style="color:var(--ink2);margin-bottom:10px">The read</div>${read(x,y)}</div>
  </div>`;
}

function categoryButtons(catKey, current){

}

// ── reusable searchable combobox: filters a product list by strain or brand.
// One instance per `id` (e.g. 'a', 'b', 'similar'); state persists across re-renders.
//
// The <input> node is mounted ONCE by comboShellHTML (called only from the full
// render(), on tab switch / selection / category change — never on keystroke).
// Typing only replaces the .combo-list-holder's contents via updateComboList().
// Destroying and recreating a focused input on every keystroke is exactly the
// bug reported in round 3 (search "can't be typed into") — never do that again.
let COMBO = {};
const comboState = id => COMBO[id] || (COMBO[id] = {query: null, open: false, highlight: -1, filtered: []});
const comboLabel = p => p ? `${p.strain} (${p.brand})` : '';
const comboSelectedId = id => id === 'similar' ? sel : id === 'a' ? a : b;
const comboSelectedProduct = id => DATA.find(p => key(p) === comboSelectedId(id));

function comboListHTML(id, list){
  const st = comboState(id);
  if (!st.open) return '';
  const q = (st.query || '').toLowerCase().trim();
  // plain case-insensitive substring match on strain + brand — no fuzzy scoring,
  // no fallback to a stale/previous result. Zero matches means "no matches," full stop.
  const filtered = list.filter(p => (p.strain + ' ' + p.brand).toLowerCase().includes(q));
  st.filtered = filtered;
  if (!filtered.length) return `<ul class="combo-list"><li class="combo-empty">No matches found</li></ul>`;
  return `<ul class="combo-list">${filtered.map((p,i) => `<li data-id="${key(p)}" class="${i===st.highlight?'hl':''}">${p.strain} <span>${p.brand}${stocked(p)?'':' · sold out'}</span></li>`).join('')}</ul>`;
}
function comboShellHTML(id, list, selectedId){
  const st = comboState(id);
  const shown = st.query !== null ? st.query : comboLabel(list.find(p => key(p) === selectedId));
  return `<div class="combo" data-combo="${id}">
    <input type="text" class="combo-input" id="combo-${id}" autocomplete="off"
      placeholder="Search strain or brand…" value="${shown.replace(/"/g,'&quot;')}">
    <div class="combo-list-holder">${comboListHTML(id, list)}</div>
  </div>`;
}
// Find Similar's source picker searches the WHOLE archive, sold-out included —
// "I loved X, you're out of it, what's close?" is the question it exists to
// answer, so the discontinued product has to be selectable. Compare's two
// pickers stay on the in-stock pool. (Recommendations are filtered separately;
// only in-stock items are ever suggested.)
const comboSource = id => id === 'similar'
  ? DATA.slice().sort((x, y) => x.strain.localeCompare(y.strain, undefined, {sensitivity: 'base'}))
  : pool();
function updateComboList(id){
  const holder = document.querySelector(`[data-combo="${id}"] .combo-list-holder`);
  if (holder) holder.innerHTML = comboListHTML(id, comboSource(id));
}
function comboChoose(id, productId){
  const st = comboState(id);
  st.query = null; st.open = false; st.highlight = -1;
  if (id === 'similar') sel = productId;
  else if (id === 'a') a = productId;
  else if (id === 'b') b = productId;
  render();   // a real selection, not a keystroke — safe to fully rebuild
}

function render(){
  const P = $('#panel'), O = $('#out');
  document.querySelectorAll('.tabs button').forEach(t => t.setAttribute('aria-selected', t.dataset.tab === tab));
  const list = pool();
  const banner = flash ? `<div class="flash">${flash}</div>` : '';

  if (tab === 'effect'){
    // mount the shell ONCE per render(); typing updates results only, via
    // renderEffectResults() — never touches this <input> node (see combo comment above)
    P.innerHTML = banner + categoryButtons('effCat', effCat)
      + `<div class="searchwrap">
           <input type="text" id="q" placeholder='e.g. "relaxing but not sleepy" or "social preroll"' value="${window._q||''}">
           <button type="button" class="clearbtn${(window._q||'') ? ' show' : ''}" data-clear="q" aria-label="Clear search">&times;</button>
         </div>`;
    return renderEffectResults();
  }

  if (tab === 'similar'){
    // source: anything in the archive, including sold-out. candidates: in stock only.
    const sources = comboSource('similar');
    sel = sel && DATA.some(p=>key(p)===sel) ? sel : key(sources[0]||{});
    P.innerHTML = banner + comboShellHTML('similar', sources, sel) + categoryButtons('simCat', simCat);
    const p = DATA.find(x => key(x) === sel);
    if (!p){ O.innerHTML = `<div class="empty">No records yet.</div>`; return foot(); }

    // category filter narrows the *results* only — the source product is unaffected
    const candidates = DATA.filter(x => key(x) !== key(p) && ($('#oos').checked || stocked(x))
      && (simCat === 'All' || category(x) === simCat));
    if (!candidates.length){
      O.innerHTML = `<div class="empty">Nothing ${simCat === 'All' ? '' : simCat.toLowerCase()+' '}on the shelf to compare against.</div>`;
      return foot();
    }
    const ranked = candidates.map(x => [sim(p,x), x]).sort((m,n) => n[0]-m[0]);
    O.innerHTML = (ranked[0][0] < 0.5
        ? `<div class="card"><div class="warnbox" style="margin:0">Nothing on the shelf is close to <b>${p.strain}</b> — its profile is ${p.dominant.slice(0,2).map(k=>short(k).toLowerCase()).join('/')}-led and nothing else here looks like that. <b>Say so. Don't substitute.</b></div></div>`
        : '')
      + ranked.slice(0,4).map(([s,x]) =>
          card(x, `<div class="match">${Math.round(s*100)}% terpene similarity</div>`)).join('');
    return foot();
  }

  if (tab === 'lookup'){
    P.innerHTML = banner + `<div class="searchwrap">
        <input type="text" id="lookupQ" placeholder="Type a strain or brand…" value="${lookupQ.replace(/"/g,'&quot;')}">
        <button type="button" class="clearbtn${lookupQ ? ' show' : ''}" data-clear="lookupQ" aria-label="Clear search">&times;</button>
      </div>`;
    return renderLookupResults();
  }

  // compare
  a = a && list.some(p=>key(p)===a) ? a : key(list[0]||{});
  b = b && list.some(p=>key(p)===b) ? b : key(list[1]||{});
  P.innerHTML = banner + `<div class="pair">${comboShellHTML('a', list, a)}${comboShellHTML('b', list, b)}</div>`;
  const x = DATA.find(p => key(p) === a), y = DATA.find(p => key(p) === b);
  O.innerHTML = (x && y && x !== y) ? compare(x, y) : `<div class="empty">Pick two different products.</div>`;
  foot();
}

// ── effect-tab results only: called on every keystroke AND on full render().
// Must never touch #q or the category buttons' DOM nodes wholesale — only
// toggle their .active class and rewrite #out. (Root cause of round-3 bugs
// #1/#2/#3: rebuilding an input on every keystroke kills focus mid-type.)
function renderEffectResults(){
  const O = $('#out');
  const rawQ = (window._q||'').toLowerCase().trim();
  const detected = detectCategoryWord(rawQ);
  const activeCat = effCat !== 'All' ? effCat : (detected || 'All');   // explicit button wins; text is a bonus

  document.querySelectorAll('[data-catkey="effCat"] button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === activeCat);
  });

  const med = MEDICAL.find(m => rawQ.includes(m));
  if (med){
    O.innerHTML = `<div class="card"><div class="warnbox" style="margin:0">I can't match on medical conditions — that's not a claim this tool is allowed to make, or one the science supports. Try describing the <b>feeling</b> instead: "relaxed but clear-headed", "energetic", "mellow".</div></div>`;
    return foot();
  }

  const list = pool();
  const scoped = list.filter(p => activeCat === 'All' || category(p) === activeCat);
  if (!rawQ){
    O.innerHTML = scoped.length ? scoped.map(p => card(p)).join('') : `<div class="empty">Nothing ${activeCat === 'All' ? '' : activeCat.toLowerCase()+' '}on the shelf.</div>`;
    return foot();
  }

  // strip a recognized category word so it doesn't get parsed as an effect keyword
  const qClean = detected ? rawQ.replace(CATEGORY_WORDS.find(([re]) => re.test(rawQ))[0], ' ').replace(/\s+/g,' ').trim() : rawQ;

  const [pos, neg] = [[], []];
  qClean.split(/\bbut\b|,|\band\b/).forEach(part => {
    const negated = /\bnot\b|\bwithout\b|\bno\b/.test(part);
    Object.entries(WANT).forEach(([kw, ts]) => {
      if (part.includes(kw)) ts.forEach(t => (negated ? neg : pos).push(t));
    });
  });
  if (!pos.length && !neg.length){ O.innerHTML = `<div class="empty">Nothing matched “${rawQ}”. Try words like relaxed, energetic, focused, mellow, sleepy, social.</div>`; return foot(); }

  const scored = scoped.map(p => {
    const v = vec(p);
    let s = pos.reduce((t,k) => t + (v[k]||0), 0) - neg.reduce((t,k) => t + (v[k]||0)*1.4, 0);
    if (p.confidence === 'faint') s *= 0.45;   // faded profiles don't get to win
    return [s, p];
  }).filter(([s]) => s > 0.02).sort((m,n) => n[0]-m[0]);

  O.innerHTML = scored.length
    ? scored.slice(0,6).map(([,p]) => card(p)).join('')
    : `<div class="empty">Nothing on the shelf fits that. Saying so is better than a bad substitution.</div>`;
  return foot();
}

// ── lookup: type → matching list → tap one → full card (reuses card()).
// Search covers whatever the in-stock toggle currently scopes to, same as
// every other tab. Typing (see the #lookupQ input handler) clears lookupSel
// so a fresh keystroke means "search again" — this function must NOT clear it
// itself, since it also runs right after a selection is made.
function renderLookupResults(){
  const O = $('#out');
  if (lookupSel){
    const p = DATA.find(x => key(x) === lookupSel);
    if (p){
      O.innerHTML = `<button type="button" class="lookup-back" data-lookup-back="1">‹ Back to search</button>` + card(p);
      return foot();
    }
    lookupSel = null;
  }
  const q = lookupQ.trim().toLowerCase();
  if (!q){ O.innerHTML = `<div class="empty">Type a strain or brand to look it up.</div>`; return foot(); }
  const matches = pool().filter(p => (p.strain + ' ' + p.brand).toLowerCase().includes(q));
  O.innerHTML = matches.length
    ? `<div class="lookup-list">${matches.map(p => `<button type="button" class="lookup-row" data-lookup-id="${key(p)}">
         <span class="lookup-strain">${p.strain}</span><span class="lookup-brand">${p.brand}${stocked(p)?'':' · out of stock'}</span>
       </button>`).join('')}</div>`
    : `<div class="empty">No matches found.</div>`;
  return foot();
}
function foot(){
  const unverified = DATA.filter(p => shelfTag(p) === 'Unverified').length;
  $('#foot').innerHTML = `${DATA.length} products · ${DATA.filter(stocked).length} in stock${
    unverified ? ` · <b>${unverified} shelf tag${unverified>1?'s':''} unverified</b> — tap Edit on a card to set one` : ''}<br>
    ●●● real receptor mechanism · ●●○ some human data · ●○○ folklore<br>
    Only caryophyllene has a mechanism (CB2). The rest is inherited from strain databases.<br>
    <b>THC is the one number on the COA that reliably drives the experience.</b>`;
}

document.addEventListener('click', e => {
  const t = e.target.closest('.tabs button');
  if (t){ tab = t.dataset.tab; render(); return; }

  const c = e.target.closest('.catseg button');
  if (c){
    const catKey = c.closest('.catseg').dataset.catkey;
    if (catKey === 'effCat') effCat = c.dataset.cat;
    if (catKey === 'simCat') simCat = c.dataset.cat;
    render();
    return;
  }

  const clr = e.target.closest('[data-clear]');
  if (clr){
    const id = clr.dataset.clear;
    const inp = document.getElementById(id);
    if (inp) inp.value = '';                 // direct write; the node stays mounted
    if (id === 'q'){ window._q = ''; renderEffectResults(); }
    else { lookupQ = ''; lookupSel = null; renderLookupResults(); }
    toggleClear(id);
    if (inp) inp.focus();                    // ready to type the next thing
    return;
  }

  const row = e.target.closest('.lookup-row');
  if (row){ lookupSel = row.dataset.lookupId; renderLookupResults(); return; }
  const back = e.target.closest('[data-lookup-back]');
  if (back){ lookupSel = null; renderLookupResults(); }
});
document.addEventListener('change', e => {
  if (e.target.id === 'oos') render();
});
// Show the × only when there's something to clear. Toggles a class on the
// button that's already mounted — never re-renders the input, same rule as
// everything else that runs on keystroke.
function toggleClear(inputId){
  const btn = document.querySelector(`[data-clear="${inputId}"]`);
  const inp = document.getElementById(inputId);
  if (btn && inp) btn.classList.toggle('show', !!inp.value);
}

document.addEventListener('input', e => {
  // Each of these updates ONLY the results below its input — the input node
  // itself is never touched, so focus and cursor position are never at risk.
  if (e.target.id === 'q'){ window._q = e.target.value; toggleClear('q'); renderEffectResults(); return; }
  if (e.target.id === 'lookupQ'){ lookupQ = e.target.value; lookupSel = null; toggleClear('lookupQ'); renderLookupResults(); return; }
  const inp = e.target.closest('.combo-input');
  if (inp){
    const id = inp.closest('.combo').dataset.combo;
    const st = comboState(id);
    st.query = inp.value; st.open = true; st.highlight = -1;
    updateComboList(id);
  }
});

// mousedown (not click) so selecting a row fires before the input's blur closes the list
document.addEventListener('mousedown', e => {
  const li = e.target.closest('.combo-list li[data-id]');
  if (!li) return;
  e.preventDefault();
  comboChoose(li.closest('.combo').dataset.combo, li.dataset.id);
});
document.addEventListener('focusin', e => {
  const inp = e.target.closest('.combo-input');
  if (!inp) return;
  const id = inp.closest('.combo').dataset.combo;
  const st = comboState(id);
  if (st.open) return;   // already open (e.g. refocus after a keypress) — don't reset the query
  st.open = true; st.query = ''; st.highlight = -1;
  inp.value = '';         // clear to search fresh; direct DOM write, no re-render
  updateComboList(id);
});
document.addEventListener('focusout', e => {
  const inp = e.target.closest('.combo-input');
  if (!inp) return;
  const id = inp.closest('.combo').dataset.combo;
  const st = comboState(id);
  st.open = false; st.query = null; st.highlight = -1;
  inp.value = comboLabel(comboSelectedProduct(id));   // revert to the current selection's label
  updateComboList(id);
});
document.addEventListener('keydown', e => {
  const inp = e.target.closest('.combo-input');
  if (!inp) return;
  const id = inp.closest('.combo').dataset.combo;
  const st = comboState(id);
  if (e.key === 'ArrowDown'){
    e.preventDefault(); st.open = true; st.highlight = Math.min(st.highlight+1, st.filtered.length-1);
    updateComboList(id);
  } else if (e.key === 'ArrowUp'){
    e.preventDefault(); st.highlight = Math.max(st.highlight-1, 0);
    updateComboList(id);
  } else if (e.key === 'Enter'){
    e.preventDefault();
    if (st.highlight >= 0 && st.filtered[st.highlight]) comboChoose(id, key(st.filtered[st.highlight]));
  } else if (e.key === 'Escape'){
    st.open = false; st.query = null; st.highlight = -1;
    inp.value = comboLabel(comboSelectedProduct(id));
    updateComboList(id);
    inp.blur();
  }
});

// ── loading data
//
// Preferred path is the Worker: it returns every record in ONE response, using
// its own authenticated GitHub quota. Going straight to GitHub from here means
// 1 API call per load against a limit of 60/hour PER IP — and every device on
// the shop's wifi shares that one number, so a busy shift can exhaust it and
// silently drop everyone back to the embedded seed. The Worker path is what
// makes polling safe.
async function fetchRecords(){
  if (STOCK_API){
    try {
      const res = await fetch(STOCK_API.replace(/\/+$/, '') + '/data', {cache: 'no-store'});
      if (!res.ok) throw new Error('worker ' + res.status);
      const recs = await res.json();
      if (Array.isArray(recs) && recs.length) return recs;
      throw new Error('empty');
    } catch(e){
      // Worker not redeployed yet, or having a bad day. Fall through to GitHub
      // rather than dropping everyone to the 9-record embedded seed.
    }
  }
  const idx = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/data`,
    {cache: 'no-store'}).then(r=>r.json());
  if (!Array.isArray(idx)) throw new Error('rate limited');   // caller keeps the seed
  return Promise.all(idx.filter(f=>f.name.endsWith('.json')).map(async f => {
    // ?v=<sha> is load-bearing, not decoration. raw.githubusercontent serves
    // max-age=300, so without it a refresh reads a five-minute-old copy and
    // overwrites a stock change that was just made. The sha changes exactly
    // when the file does, so this is always fresh and still CDN-cacheable.
    const p = await fetch(`${f.download_url}?v=${f.sha}`).then(r=>r.json());
    p._key = f.name.replace(/\.json$/, '');   // repo filename is unique by construction; the record's own `id` isn't
    return p;
  }));
}

(async function load(){
  if (GH_USER && GH_REPO){
    try { DATA = await fetchRecords(); }
    catch(err){ flash = 'Using built-in data — couldn\'t reach the repo.'; }
  }
  render();
  startAutoRefresh();
})();

// ── keep every screen current without anyone touching it
//
// A register sits on this page all shift. Without this it would show whatever
// was true when the page was opened — which would defeat the entire point of
// stock being shared. Refresh on a timer while visible, and immediately when
// someone comes back to the tab.
let refreshTimer = null;
async function refresh(){
  if (busyKey) return;                      // don't fight an in-flight write
  let fresh;
  try { fresh = await fetchRecords(); } catch(e){ return; }   // offline: keep what we have
  if (!fresh || !fresh.length) return;
  DATA = applyRecentWrites(fresh);
  // Re-rendering under someone's fingers would wipe what they're typing, so
  // take the data now and let the next natural render show it.
  const el = document.activeElement;
  const typing = el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA');
  if (!typing) render();
}
function startAutoRefresh(){
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => { if (!document.hidden) refresh(); }, 60000);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });
}
</script>
</body>
</html>
